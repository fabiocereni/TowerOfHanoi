image: gitlab-edu.supsi.ch:5050/dti-isin/labingsw/common:ubuntu2404-cg

stages:
  - build

build-project:
  stage: build
  script:
    # 1. Installazione dipendenze (necessaria)
    - apt-get update && apt-get install -y --no-install-recommends freeglut3-dev libglu1-mesa libgl1 libxi6 libxmu6
    
    # 2. Build completa (Compila, Testa, Pacchettizza)
    - make
    
    # Nota: Non serve fare altro, il 'make' ha già creato hanoiTower.tar.gz nella root
  
  artifacts:
    paths:
      # Salviamo SOLO l'archivio finale richiesto
      - hanoiTower.tar.gz
    expire_in: 1 week
    when: on_success

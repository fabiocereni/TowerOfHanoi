image: gitlab-edu.supsi.ch:5050/dti-isin/labingsw/common:ubuntu2404-cg

stages:
  - build

build:
  stage: build
  script:
    - apt-get update
    - apt-get install -y --no-install-recommends freeglut3-dev libglu1-mesa libgl1 libxi6 libxmu6
    
    - make clean
    - make -j"$(nproc)"
    
    - mkdir -p dependencies/lib
    - |
      echo "--- Inizio Bundling Librerie ---"
      

      BINARIES="engine/bin/Debug/libengine.so engine/bin/Release/libengine.so client/bin/Debug/client client/bin/Release/client"
      
      for bin in $BINARIES; do
        if [ -f "$bin" ]; then
          ldd "$bin" | grep "=> /" | while read -r line; do
            lib_soname=$(echo "$line" | awk '{print $1}')
            lib_path=$(echo "$line" | awk '{print $3}')
            

            if echo "$lib_path" | grep -q "dependencies/lib"; then
              continue
            fi
            

            cp -L -n "$lib_path" "dependencies/lib/$lib_soname" || true
          done
        fi
      done
      

      echo "--- Applicazione Fix Manuale FreeGLUT ---"
      GLUT_REAL_PATH=$(ldd engine/bin/Debug/libengine.so | grep libglut | awk '{print $3}' | head -n 1)
      
      if [ ! -z "$GLUT_REAL_PATH" ]; then
        echo "Trovata libglut in: $GLUT_REAL_PATH"
        

        
 
        cp -L "$GLUT_REAL_PATH" dependencies/lib/libglut.so.3.12
        echo "Creata dependencies/lib/libglut.so.3.12"
        

        cp -L "$GLUT_REAL_PATH" dependencies/lib/libglut.so.3
        

        cp -L "$GLUT_REAL_PATH" dependencies/lib/libglut.so
      else
        echo "ERRORE: Impossibile trovare il percorso di libglut tramite ldd!"
        exit 1
      fi

  artifacts:
    paths:
      - engine/bin
      - client/bin
      - dependencies/lib
    when: always
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "dev"'

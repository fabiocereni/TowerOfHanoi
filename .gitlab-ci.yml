image: gitlab-edu.supsi.ch:5050/dti-isin/labingsw/common:ubuntu2404-cg

stages:
  - build

build:
  stage: build
  script:
    - apt-get update
    - apt-get install -y --no-install-recommends freeglut3-dev libglu1-mesa libgl1 libxi6 libxmu6
    
    
    - make clean
    - make -j"$(nproc)"
    
    
    - mkdir -p dependencies/lib
    - echo "Bundling dependencies..."
    
    - |
      BINARIES="engine/bin/Debug/libengine.so engine/bin/Release/libengine.so client/bin/Debug/client client/bin/Release/client"
      for bin in $BINARIES; do
        if [ -f "$bin" ]; then
          ldd "$bin" | grep "=> /" | while read -r line; do
            lib_soname=$(echo "$line" | awk '{print $1}')
            lib_path=$(echo "$line" | awk '{print $3}')
            
            # --- BLOCCO DI SICUREZZA (Blacklist) ---
            # Questo è il trucco: ESCLUDIAMO le librerie di sistema che causavano il crash.
            # Usiamo le versioni del tuo PC locale, non quelle di Ubuntu 24.04.
            if echo "$lib_soname" | grep -Eq "^(libc\.so|libstdc\+\+|libm\.so|libpthread|libdl|librt|ld-linux|libgcc_s)"; then
              # echo "Ignoro libreria di sistema: $lib_soname"
              continue
            fi
            
            # Evita di copiare se il file è già nella cartella di destinazione
            if echo "$lib_path" | grep -q "dependencies/lib"; then continue; fi
            
            # Copia la libreria utile (es. libGLEW, libengine, ecc.)
            cp -L -n "$lib_path" "dependencies/lib/$lib_soname" || true
          done
        fi
      done


    - echo "Applicazione fix nomi FreeGLUT..."
    - GLUT_REAL=$(ldd engine/bin/Debug/libengine.so | grep libglut | awk '{print $3}' | head -n 1)
    # Fallback se ldd non la trova
    - if [ -z "$GLUT_REAL" ]; then GLUT_REAL=$(find /usr/lib -name "libglut.so*" | head -n 1); fi
    
    - if [ ! -z "$GLUT_REAL" ]; then
        cp -L "$GLUT_REAL" dependencies/lib/libglut.so.3.12
        cp -L "$GLUT_REAL" dependencies/lib/libglut.so.3
        cp -L "$GLUT_REAL" dependencies/lib/libglut.so
      fi


    - echo '#!/bin/bash' > run_client.sh
    - echo 'DIR="$( cd "$( dirname "${BASH_SOURCE[0]}" )" && pwd )"' >> run_client.sh
    - echo 'export LD_LIBRARY_PATH="$DIR/dependencies/lib:$LD_LIBRARY_PATH"' >> run_client.sh
    - echo 'echo "Avvio Client..."' >> run_client.sh
    - echo 'chmod +x "$DIR/client/bin/Debug/client"' >> run_client.sh
    - echo 'exec "$DIR/client/bin/Debug/client"' >> run_client.sh
    - chmod +x run_client.sh

  artifacts:
    paths:
      - engine/bin
      - client/bin
      - dependencies/lib
      - run_client.sh
    when: always
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "dev"'

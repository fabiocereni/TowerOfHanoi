image: gitlab-edu.supsi.ch:5050/dti-isin/labingsw/common:ubuntu2404-cg

stages:
  - build


build:
  stage: build
  script:
    - make clean                         # pulizia artefatti precedenti
    - make -j"$(nproc)"                  # build parallela engine + client
  artifacts:
    paths:
      - engine/bin                       # esporta libreria compilata
      - client/bin                       # esporta eseguibile compilato
    when: always
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "dev"'

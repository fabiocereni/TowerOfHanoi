image: gitlab-edu.supsi.ch:5050/dti-isin/labingsw/common:ubuntu2404-cg

stages:
  - build

# JOB 1: LINUX
build-linux-release:
  stage: build
  script:
    - apt-get update && apt-get install -y --no-install-recommends freeglut3-dev libglu1-mesa libgl1 libxi6 libxmu6
    - make
  artifacts:
    paths:
      - hanoiTower_release.tar.gz
    expire_in: 1 week
    when: on_success

# JOB 2: WINDOWS (Aggiornato con 'unzip')
build-windows-exe:
  stage: build
  script:
    # Aggiunto 'unzip' qui sotto
    - apt-get update && apt-get install -y --no-install-recommends mingw-w64 make zip wget unzip
    - make cross_win
  artifacts:
    paths:
      - hanoiTower_win.zip
    expire_in: 1 week
    when: on_success

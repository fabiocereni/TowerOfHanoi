variables:
  BUILD_TYPE: "Release"
  ENGINE_DIR: "$CI_PROJECT_DIR/engine"
  CLIENT_DIR: "$CI_PROJECT_DIR/client"
  DEP_DIR: "$CI_PROJECT_DIR/dependencies"


image: registry.gitlab.com/tuo-repo/gcc14-opengl

stages:
  - engine
  - client

cache:
  key: "make-$CI_COMMIT_REF_SLUG"
  paths:
    - engine/build/
    - client/build/
    - dependencies/

engine:
  stage: engine
  image: gcc:14

  before_script:
    - apt-get update -y
    - apt-get install -y libglm-dev freeglut3-dev libglu1-mesa-dev
    - cd "$ENGINE_DIR"

  script:
    - make clean
    - make all BUILD_TYPE="$BUILD_TYPE"

  artifacts:
    paths:
      - engine/bin/
      - dependencies/
    expire_in: 1 hour

  rules:
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "dev"'


client:
  stage: client
  image: gcc:14
  dependencies:
    - engine

  before_script:
    - apt-get update -y
    - apt-get install -y libglm-dev freeglut3-dev libglu1-mesa-dev
    - cd "$CLIENT_DIR"

  script:
    - make clean
    - make all BUILD_TYPE="$BUILD_TYPE"

  artifacts:
    paths:
      - client/bin/
      - dependencies/
    expire_in: 1 hour

  rules:
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "dev"'


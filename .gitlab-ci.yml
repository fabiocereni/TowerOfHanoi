image: gitlab-edu.supsi.ch:5050/dti-isin/labingsw/common:ubuntu2404-cg

stages:
  - build

build:
  stage: build
  script:
    - apt-get update
    - apt-get install -y --no-install-recommends freeglut3-dev libglu1-mesa libgl1 libxi6 libxmu6
    
    - make clean
    - make -j"$(nproc)"
    
    - mkdir -p dependencies/lib
    - |
      BINARIES="engine/bin/Debug/libengine.so engine/bin/Release/libengine.so client/bin/Debug/client client/bin/Release/client"
      
      for bin in $BINARIES; do
        if [ -f "$bin" ]; then
          echo "Bundling libraries for $bin..."
          ldd "$bin" | grep "=> /" | while read -r line; do
            
            lib_soname=$(echo "$line" | awk '{print $1}')
            
            lib_path=$(echo "$line" | awk '{print $3}')
            
            lib_realname=$(basename "$lib_path")
            

            if echo "$lib_path" | grep -q "dependencies/lib"; then
              continue
            fi
            
           
            cp -L "$lib_path" "dependencies/lib/$lib_realname"
            
            
            if [ "$lib_soname" != "$lib_realname" ]; then
              echo "Linking $lib_soname -> $lib_realname"
              ln -sf "$lib_realname" "dependencies/lib/$lib_soname"
            fi
          done
        fi
      done

  artifacts:
    paths:
      - engine/bin
      - client/bin
      - dependencies/lib
    when: always
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "dev"'

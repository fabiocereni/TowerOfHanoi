image: gitlab-edu.supsi.ch:5050/dti-isin/labingsw/common:ubuntu2404-cg

stages:
  - build

build:
  stage: build
  script:
    - make clean
    - make -j"$(nproc)"
    # Copia le librerie runtime OpenGL/FreeGLUT nell'artifact per esecuzione senza installazioni
    - mkdir -p dependencies/lib
    - |
      for lib in libglut.so libGLU.so libGL.so libX11.so libXi.so libXmu.so; do
        find /usr/lib /lib -name "${lib}*" -type f -exec cp -L {} dependencies/lib/ \; || true
      done
  artifacts:
    paths:
      - engine/bin
      - client/bin
      - dependencies/lib
    when: always
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "dev"'

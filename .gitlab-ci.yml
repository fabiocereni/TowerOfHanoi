variables:
  BUILD_TYPE: "Release"
  ENGINE_DIR: "$CI_PROJECT_DIR/engine"
  CLIENT_DIR: "$CI_PROJECT_DIR/client"
  DEP_DIR: "dependencies"        # <<< IMPORTANTE: percorso RELATIVO!

stages:
  - engine
  - client

cache:
  key: "make-$CI_COMMIT_REF_SLUG"
  paths:
    - engine/build/
    - client/build/

engine:
  stage: engine
  image: gcc:12

  before_script:
    - cd $ENGINE_DIR

  script:
    - make clean
    - make all BUILD_TYPE=$BUILD_TYPE

  artifacts:
    paths:
      - engine/bin/
      - $DEP_DIR/               # <<< ora verrà incluso correttamente
    expire_in: 1 hour

  rules:
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "dev"'

client:
  stage: client
  image: gcc:12
  dependencies:
    - engine                    # <<< recupera gli artifacts

  before_script:
    - cd $CLIENT_DIR
    # Copia le dipendenze arrivate dagli artifacts
    - cp -r ../$DEP_DIR ../engine/

  script:
    - make clean
    - make all BUILD_TYPE=$BUILD_TYPE

  artifacts:
    paths:
      - client/bin/
    expire_in: 1 hour

  rules:
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "dev"'

variables:
  BUILD_TYPE: "Release"
  ENGINE_DIR: "$CI_PROJECT_DIR/engine"
  CLIENT_DIR: "$CI_PROJECT_DIR/client"
  DEP_DIR: "dependencies"   # cartella nella ROOT del progetto

stages:
  - engine
  - client

cache:
  key: "make-$CI_COMMIT_REF_SLUG"
  paths:
    - engine/build/
    - client/build/

engine:
  stage: engine
  image: gcc:12

  script:
    - cd engine
    - make clean
    - make all BUILD_TYPE=$BUILD_TYPE

  artifacts:
    paths:
      - engine/bin/
      - dependencies/        # <<< ORA prende la cartella GIUSTA, quella in root
    expire_in: 1 hour

  rules:
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "dev"'

client:
  stage: client
  image: gcc:12
  dependencies:
    - engine

  script:
    - cd client
    - cp -r ../dependencies ../engine/       # <<< ora esiste davvero
    - make clean
    - make all BUILD_TYPE=$BUILD_TYPE

  artifacts:
    paths:
      - client/bin/
    expire_in: 1 hour

  rules:
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "dev"'
